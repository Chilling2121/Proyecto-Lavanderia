<!-- CABECERA SUPERIOR (HEADER) -->
<header class="top-header">
    <div style="display: flex; align-items: center; gap: 0.75rem;">
        <div class="header-title">
            <h1>{{ page_title|default:"LavaFácil" }}</h1>
        </div>
    </div>
    
    <div class="header-actions">
        <!-- Icono de Notificación -->
        <button onclick="if(typeof showToast === 'function') showToast('No tienes notificaciones nuevas por el momento.', 'info');" style="background: none; border: none; color: var(--text-muted); cursor: pointer; position: relative;" title="Notificaciones">
            <span style="position: absolute; top: -2px; right: -2px; width: 8px; height: 8px; background-color: var(--danger); border-radius: 50%;"></span>
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
        </button>
        
        <!-- Perfil de Usuario -->
        <div class="header-user">
            <div class="user-avatar">
                {{ request.user.username|slice:":2"|upper }}
            </div>
            <div class="user-info">
                <span class="user-name">{{ request.user.get_full_name|default:request.user.username|capfirst }}</span>
                <span class="user-role">{{ request.user.groups.first.name|default:"Sin Rol" }}</span>
            </div>
        </div>
    </div>
</header>
